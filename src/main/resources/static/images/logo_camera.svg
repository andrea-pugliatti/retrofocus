<svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 373 226"
      width="300px"
      height="200px"
    >
      <g id="camera-logo">
        <g fill="none" stroke="#4C3A28" stroke-width="5" stroke-linejoin="round">
          <rect x="47" y="8" width="12" height="15" rx="1" />
          <rect x="41" y="14" width="24" height="15" rx="1" />
          <rect x="95" y="14" width="36" height="15" rx="1" />
          <rect x="150" y="12" width="50" height="15" rx="1" />
        </g>

        <rect
          x="5"
          y="20"
          width="364"
          height="196"
          rx="8"
          ry="8"
          fill="#F2F0E6"
          stroke="#4C3A28"
          stroke-width="5"
          stroke-linejoin="round"
        />

        <g fill="none" stroke="#4C3A28" stroke-width="5" stroke-linejoin="round">
          <line x1="5" y1="75" x2="369" y2="75" />
          <line x1="5" y1="204" x2="369" y2="204" />

          <line x1="30" y1="95" x2="75" y2="95" strokeLinecap="round" />

          <rect x="99" y="35" width="22" height="16" rx="2" />
          <rect x="197" y="32" width="42" height="24" rx="2" />
          <rect x="255" y="32" width="56" height="32" rx="2" />

          <rect x="69" y="85" width="12" height="28" rx="6" fill="#F2F0E6" />
        </g>

        <g
          transform="translate(320, 115) rotate(15)"
          fill="#F2F0E6"
          stroke="#4C3A28"
          stroke-width="5"
        >
          <rect x="-6" y="-12" width="12" height="24" rx="6" />
        </g>

        <g id="lens">
          <circle cx="187" cy="135" r="76" fill="#F2F0E6" stroke="#4C3A28" stroke-width="5" />

          <path
            d="M 111 120 A 14 14 0 0 0 111 150"
            fill="#F2F0E6"
            stroke="#4C3A28"
            stroke-width="5"
            strokeLinecap="round"
          />

          <circle cx="187" cy="135" r="56" fill="#EA6B15" />

          <g transform="translate(187, 135)">
            <polygon points="-12,-20.78 12,-20.78 24,0 12,20.78 -12,20.78 -24,0" fill="#F2F0E6" />

            <g stroke="#F2F0E6" stroke-width="4.5" strokeLinecap="round">
              <line x1="-10" y1="-21" x2="50" y2="-20.78" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(120)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(180)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(60)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(240)" />
              <line x1="-10" y1="-20.78" x2="50" y2="-20.78" transform="rotate(300)" />
            </g>
          </g>

          <circle cx="187" cy="135" r="56" fill="none" stroke="#4C3A28" stroke-width="5" />
        </g>
