<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fragments :: head(${camera.name})}" />

<body>
    <div th:replace="~{fragments/header :: header('cameras')}" />

    <main class="container">

        <div class="card my-5 mx-auto" th:object="${camera}">
            <div class="row g-0">
                <div class="col-md-7 col-lg-8">
                    <img th:src="|/images/*{image}|" class="img-fluid rounded-start w-100" alt="">
                </div>
                <div class="col-md-5 col-lg-4">
                    <div class="card-body">
                        <h3 class="card-title playfair-font fs-1">
                            [[*{name}]]
                        </h3>
                        <p class="card-text">
                            [[*{description}]]
                        </p>
                        <p class="card-text">
                            <span class="fw-bold">Year </span>

                            <span th:unless="${camera.yearReleased == null}">
                                [[*{yearReleased.getYear()}]]
                            </span>
                            <span th:unless="${camera.yearDiscontinued == null}">
                                <span> - </span>
                                [[*{yearDiscontinued.getYear()}]]
                            </span>
                        </p>
                        <p class="card-text">
                            <span class="fw-bold">Mount </span>
                            [[*{mount.getName()}]]
                        </p>
                        <p class="card-text">
                            <span class="fw-bold">Body Type </span>
                            [[*{type}]]
                        </p>
                        <p class="card-text">
                            <span class="fw-bold">Format </span>
                            [[*{format}]]
                        </p>
                        <p class="card-text" th:unless="${camera.minShutterSpeed == null}">
                            <span class="fw-bold">Minimum Shutter Speed </span>
                            [[*{minShutterSpeed}]]
                        </p>
                        <p class="card-text" th:unless="${camera.maxShutterSpeed == null}">
                            <span class="fw-bold">Maximum Shutter Speed </span>
                            [[*{maxShutterSpeed}]]
                        </p>
                        <div class="">
                            <a class="btn btn-success btn-sm" th:href="@{/cameras/edit/{id}(id = *{id})}">
                                Update
                            </a>
                            <div th:replace="~{fragments/modal :: trigger(*{id})}" />
                            <div th:replace="~{fragments/modal :: modal(*{name}, 'cameras', *{id})}" />
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <div th:replace="~{fragments/footer :: footer()}" />

    <div th:replace="~{fragments/fragments :: bootstrap}" />
</body>

</html>
