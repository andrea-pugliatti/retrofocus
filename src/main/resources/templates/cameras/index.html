<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fragments :: head('Cameras')}" />

<body>
    <div th:replace="~{fragments/header :: header('cameras')}" />

    <main class="container mb-5">
        <h3 class="my-3">Cameras</h3>

        <div class="text-center fs-5 fw-700" th:unless="${cameras.size() > 0}">
            There are no cameras available.
        </div>

        <div class="row gy-4 row-cols-1 row-cols-sm-2 row-cols-md-4" th:if="${cameras.size() > 0}">

            <div class="col" th:each="camera: ${cameras}" th:object="${camera}">
                <div class="card">
                    <img class="card-img-top" th:src="*{image}">
                    <div class="card-body">

                        <div class="my-1 fs-5 fw-bold">[[*{name}]]</div>
                        <div class="my-1">[[*{description}]]</div>
                        <div class="my-1">[[*{type}]]</div>
                        <div class="my-1">[[*{format}]]</div>
                        <div class="my-1">[[*{yearReleased.getYear()}]]</div>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{fragments/fragments :: bootstrap}" />
</body>

</html>
