<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/fragments :: head(${photographer.name})}" />

<body>
    <div th:replace="~{fragments/header :: header('photographers')}" />

    <main class="container d-flex flex-column align-items-center">

        <div class="card my-5" th:object="${photographer}">
            <div class="row g-0">
                <div class="col-md-8">
                    <img th:src="|/images/*{image}|" height="400" class="rounded-start" alt="">
                </div>
                <div class="col-md-4" style="min-width: fit-content;">
                    <div class="card-body">
                        <h3 class="card-title playfair-font">
                            [[*{name}]]
                        </h3>
                        <p class="card-text" th:unless="${photographer.biography == null}">
                            [[*{biography}]]
                        </p>
                        <p class="card-text" th:unless="${photographer.birthday == null}">
                            <span class="fw-bold">Birthday </span>
                            [[*{birthday}]]
                        </p>
                        <div>
                            <a class="btn btn-success btn-sm" th:href="@{/photographers/edit/{id}(id = *{id})}">
                                Update
                            </a>
                            <div th:replace="~{fragments/modal :: trigger(*{id})}" />
                            <div th:replace="~{fragments/modal :: modal(*{name}, 'photographers', *{id})}" />
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <div th:replace="~{fragments/fragments :: bootstrap}" />
</body>

</html>
