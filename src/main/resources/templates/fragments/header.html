<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <nav th:fragment="header(page)" class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid mx-5">
            <a class="navbar-brand" href="/">RetroFocus</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'home' ? 'active' : ''}" aria-current="page"
                            href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'cameras' ? 'active' : ''}"
                            href="/cameras">Cameras</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'lenses' ? 'active' : ''}"
                            href="/lenses">Lenses</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'mounts' ? 'active' : ''}"
                            href="/mounts">Mounts</a>
                    </li>
                </ul>
            </div>
            <div>
                <a href="/logout" class="btn btn-sm btn-outline-primary">Logout</a>
            </div>
        </div>
    </nav>
</body>

</html>
