<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>
    <nav th:fragment="header(page)" class="navbar navbar-expand-lg bg-header">
        <div class="container-fluid mx-5">

            <img height="40" th:src=@{/images/logo_camera.svg} alt="">
            <a class="navbar-brand playfair-font fs-4 bold ms-2" href="/">RetroFocus</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse ms-auto" id="navbarNav">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'home' ? 'active' : ''}" href="/">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'cameras' ? 'active' : ''}" href="/cameras">
                            Cameras
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'lenses' ? 'active' : ''}" href="/lenses">
                            Lenses
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'mounts' ? 'active' : ''}" href="/mounts">
                            Mounts
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${page == 'photographers' ? 'active' : ''}"
                            href="/photographers">
                            Photographers
                        </a>

                    </li>
                </ul>

                <div class="ms-auto">
                    <a href="/logout" class="btn btn-sm btn-outline-warning">Logout</a>
                </div>
            </div>

        </div>
    </nav>
</body>

</html>
