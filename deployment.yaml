apiVersion: v1
kind: Pod
metadata:
  name: retrofocus-pod
spec:
  containers:
    - name: mysqldb
      image: mysql:lts
      ports:
        - containerPort: 3306
      env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
        - name: MYSQL_DATABASE
          value: "retrofocus"
        - name: MYSQL_ROOT_HOST
          value: "%"
      readinessProbe:
        exec:
          command: [ "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword" ]
        initialDelaySeconds: 10
        periodSeconds: 10

    - name: app
      image: retrofocus:latest
      ports:
        - containerPort: 8080
          hostPort: 8080
      env:
        - name: MYSQL_NAME
          value: "localhost"
        - name: MYSQL_DOCKER_PORT
          value: "3306"
        - name: MYSQL_DATABASE
          value: "retrofocus"
        - name: MYSQL_USER
          value: "root"
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
